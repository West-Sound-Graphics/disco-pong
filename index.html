<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disco Pong</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(45deg, #ff0080, #ff0000, #ff8000, #ffff00, #80ff00, #00ff00, #00ff80, #00ffff, #0080ff, #0000ff, #8000ff, #ff00ff, #ff0080, #ff4040, #40ff40, #4040ff, #ffff40, #ff40ff, #40ffff);
            background-size: 600% 600%;
            animation: discoRainbow 8s ease infinite;
        }
        @keyframes discoRainbow {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 50% 100%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        canvas {
            display: block;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-family: 'Arial Black', 'Arial', sans-serif;
            font-weight: bold;
            background: linear-gradient(45deg, #ff0000, #ff8000, #ffff00, #80ff00, #00ff00, #00ff80, #00ffff, #0080ff, #0000ff, #8000ff, #ff00ff, #ff0080);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textRainbow 3s ease infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            z-index: 10;
        }
        @keyframes textRainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .geometric-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .geometric-pattern::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 30deg, rgba(255,255,255,0.1) 30deg 60deg);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        .geometric-pattern::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
            animation: move 15s ease-in-out infinite alternate;
        }
        .geometric-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .geometric-pattern .shape1 {
            position: absolute;
            top: 5%;
            right: 5%;
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, rgba(255,0,255,0.3), rgba(0,255,255,0.3));
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: float1 12s ease-in-out infinite;
        }
        .geometric-pattern .shape2 {
            position: absolute;
            bottom: 10%;
            left: 5%;
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, rgba(255,255,0,0.3), rgba(255,0,0,0.3));
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            animation: float2 18s ease-in-out infinite reverse;
        }
        .geometric-pattern .shape3 {
            position: absolute;
            top: 50%;
            right: 20%;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, rgba(0,255,0,0.3), rgba(0,0,255,0.3));
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(30px) rotate(360deg); }
        }
        #music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: 2px solid white;
            color: white;
            font-size: 16px;
            font-family: 'Arial Black', sans-serif;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }
        #music-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        #music-toggle.playing {
            background: linear-gradient(45deg, #00ff00, #ffff00);
        }
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 20;
            text-align: center;
        }
        #title-screen .title-content {
            color: #ffffff;
            animation: pulseTitle 2s ease-in-out infinite;
        }
        #title-screen .settings-row {
            margin: 10px auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 20px;
        }
        #title-screen select {
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
        }
        #title-screen h1 {
            font-size: 96px;
            margin: 0 0 20px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #ff00ff;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.8), 0 0 40px rgba(255, 255, 0, 0.7);
        }
        #title-screen p {
            margin: 0 0 30px;
            font-size: 24px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }
        #start-button {
            font-size: 24px;
            padding: 14px 32px;
            border-radius: 30px;
            border: 2px solid #ffffff;
            color: #ffffff;
            background: linear-gradient(45deg, #ff0055, #00ffff);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease;
        }
        #start-button:hover {
            transform: scale(1.05);
        }
        @keyframes pulseTitle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes move {
            from { transform: translateX(0) translateY(0); }
            to { transform: translateX(50px) translateY(50px); }
        }
    </style>
</head>
<body>
    <div id="title-screen">
        <div class="title-content">
            <h1>DISCO PONG</h1>
            <p>Pick your style and challenge the AI</p>

            <div class="settings-row">
                <label for="ball-speed-select">Ball speed:</label>
                <select id="ball-speed-select">
                    <option value="0.08">Slow</option>
                    <option value="0.15" selected>Mid</option>
                    <option value="0.24">Fast</option>
                </select>
            </div>

            <div class="settings-row">
                <label for="ai-skill-select">Opponent skill:</label>
                <select id="ai-skill-select">
                    <option value="0.06">Easy</option>
                    <option value="0.1" selected>Normal</option>
                    <option value="0.15">Hard</option>
                </select>
            </div>

            <button id="start-button">START THE PARTY</button>
        </div>
    </div>
    <div id="score">0 : 0</div>
    <button id="music-toggle">🎵 Play Disco Music</button>
    <div class="geometric-pattern">
        <div class="shape1"></div>
        <div class="shape2"></div>
        <div class="shape3"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
